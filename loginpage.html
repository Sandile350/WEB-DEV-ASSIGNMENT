<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login System</title>

<style>
* {
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(120deg, #6a11cb, #2575fc);
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    width: 350px;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    animation: slideIn 1s ease;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.form {
    padding: 30px;
    display: none;
}

.form.active {
    display: block;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(120deg, #6a11cb, #2575fc);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    transform: scale(1.03);
}

.message {
    text-align: center;
    margin-top: 10px;
    color: red;
}

.success {
    color: green;
}

.switch {
    text-align: center;
    margin-top: 15px;
    color: #2575fc;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

    <!-- SIGN UP FORM -->
    <div class="form active" id="signupForm">
        <h2>Create Account</h2>
        <input type="text" id="signupUser" placeholder="Username">
        <input type="password" id="signupPass" placeholder="Password">
        <button onclick="signup()">Sign Up</button>
        <p class="message" id="signupMsg"></p>
        <p class="switch" onclick="showLogin()">Already have an account?</p>
    </div>

    <!-- LOGIN FORM -->
    <div class="form" id="loginForm">
        <h2>Login</h2>
        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password">
        <button onclick="login()">Login</button>
        <p class="message" id="loginMsg"></p>
    </div>

</div>

<script>
function showLogin() {
    document.getElementById("signupForm").classList.remove("active");
    document.getElementById("loginForm").classList.add("active");
}


function signup() {
    let user = document.getElementById("signupUser").value;
    let pass = document.getElementById("signupPass").value;

    if (user === "" || pass === "") {
        document.getElementById("signupMsg").innerHTML = "Please fill in all fields";
        return;
    }

    localStorage.setItem(user, pass);
    document.getElementById("signupMsg").innerHTML = "Account created! Go to login.";
    document.getElementById("signupMsg").className = "message success";

    setTimeout(showLogin, 1200);
}


function login() {
    let user = document.getElementById("loginUser").value;
    let pass = document.getElementById("loginPass").value;
    let storedPass = localStorage.getItem(user);

    if (storedPass === pass) {
        // ✅ Mark user as logged in
        localStorage.setItem("loggedInUser", user);

        document.getElementById("loginMsg").innerHTML = "Login successful!";
        document.getElementById("loginMsg").className = "message success";

        setTimeout(() => {
            window.location.href = "code 13.html";
        }, 1000);
    } else {
        document.getElementById("loginMsg").innerHTML = "Wrong username or password";
    }
}
</script>

</body>
</html>
